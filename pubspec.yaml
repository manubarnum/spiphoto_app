name: spiphoto_app
description: "A SPIPHOTO project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.3 <4.0.0'

# Dépendances du SDK Flutter
dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  html: ^0.15.4
  url_launcher: ^6.2.6
  easy_image_viewer: ^1.4.1
  extended_image: ^9.1.0
  share_plus: ^12.0.1
 
  
# Dépendances spécifiques dave
dev_dependencies:
  flutter_test:
    sdk: flutter
flutter_lints: ^2.0.0
flutter_launcher_icons: ^0.13.1


flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/mon_logo1.png"

# Paramètres spécifiques à l'application
flutter:
  uses-material-design: true
  assets:
    - android/app/src/main/res/mipmap-hdpi/ic_launcher.png
    - android/app/src/main/res/mipmap-mdpi/ic_launcher.png
    - android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
    - android/app/src/main/res/mipmap-xhdpi/rounded_launcher.png
    - android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
    - android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
    - assets/icons/mon_logo1.png